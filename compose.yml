version: "3.9"

services:
  asterisk:
    # 既存のカスタムビルドイメージを使用します
    image: ghcr.io/warpflow-home/asterisk:latest
    hostname: asterisk
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    tmpfs:
      - /var/lib/asterisk
      - /var/log/asterisk
      - /var/spool/asterisk
      - /var/log/asterisk/cdr-csv
    networks:
      - swarm-macvlan
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
        window: 120s
    healthcheck:
      disable: true

  cups:
    image: ydkn/cups:latest
    networks:
      - swarm-overlay
    ports:
      - target: 631
        published: 631
        protocol: tcp
        mode: ingress
    environment:
      - ADMIN_PASSWORD=admin
    # CUPS起動を待機してから確実に登録する処理
    entrypoint: >
      /bin/bash -c "
      /usr/sbin/cupsd && 
      echo 'Waiting for CUPS to start...' &&
      while ! lpstat -r >/dev/null 2>&1; do sleep 2; done &&
      echo 'CUPS is ready! Registering printer...' &&
      lpadmin -p Canon_G3060 -E -v ipp://192.168.1.221/ipp/print -m everywhere && 
      lpadmin -d Canon_G3060 &&
      echo 'Printer registered successfully!' &&
      tail -f /var/log/cups/error_log
      "
    deploy:
      mode: global

networks:
  swarm-macvlan:
    external: true
    name: swarm-macvlan
  swarm-overlay:
    external: true
    name: swarm-overlay