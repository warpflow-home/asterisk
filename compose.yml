version: '3.8'

services:
  asterisk:
    image: andrius/asterisk:latest
    networks:
      - hostnet
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname == node01]
    volumes:
      - ./config/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./config/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./config/rtp.conf:/etc/asterisk/rtp.conf:ro
networks:
  hostnet:
    name: host
    external: true
