version: "3.9"

services:
  asterisk:
    # 既存のカスタムビルドイメージを使用します
    image: ghcr.io/warpflow-home/asterisk:latest
    hostname: asterisk
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    tmpfs:
      - /var/lib/asterisk
      - /var/log/asterisk
      - /var/spool/asterisk
      - /var/log/asterisk/cdr-csv

    networks:
          - swarm-macvlan

    deploy:
      mode: replicated
      replicas: 1                       # SIP/RTPのポート競合を避けるため1台のみ
      update_config:
        order: stop-first               # 再起動時のIP競合防止

  cups:
    image: ydkn/cups:latest
    networks:
      - swarm-overlay
    ports:
      - target: 631
        published: 631
        protocol: tcp
        mode: ingress
    environment:
      - ADMIN_PASSWORD=admin
    entrypoint: /bin/bash -c "
      /usr/sbin/cupsd && 
      sleep 5 && 
      lpadmin -p Canon_G3060 -E -v ipp://192.168.1.221/ipp/print -m everywhere && 
      lpadmin -d Canon_G3060 &&
      tail -f /var/log/cups/error_log"
    deploy:
      mode: global

networks:
  swarm-macvlan:
    external: true
    name: swarm-macvlan
  swarm-overlay:
    external: true
    name: swarm-overlay
