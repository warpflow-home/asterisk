services:
  asterisk:
    image: ghcr.io/jarodbruce/asterisk-homelab:latest
    healthcheck:
      disable: true
    networks:
      macvlan_net:
        ipv4_address: 192.168.1.200  # Asteriskはmacvlanの固定IP
    deploy:
      replicas: 1

  cups:
    image: ydkn/cups:latest
    networks:
      - hostnet  # ホストネットワークを使用
    environment:
      - ADMIN_PASSWORD=admin
    entrypoint: /bin/bash -c "
      /usr/sbin/cupsd && 
      sleep 5 && 
      lpadmin -p Canon_G3060 -E -v ipp://192.168.1.221/ipp/print -m everywhere && 
      lpadmin -d Canon_G3060 &&
      tail -f /var/log/cups/error_log"
    deploy:
      mode: global  # 全ノードに配置（KeepalivedのVIPがどこにあっても応答可能に）

networks:
  macvlan_net:
    driver: macvlan
    driver_opts:
      parent: enp1s0  # ※実際のNIC名
    ipam:
      config:
        - subnet: 192.168.1.0/24
        - ip_range: 192.168.1.200/32
  hostnet:           # ★これがないとエラーになるので追加
    name: host
    external: true