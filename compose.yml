version: "3.9"

services:
  asterisk:
    image: ghcr.io/warpflow-home/asterisk:latest
    hostname: asterisk
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    tmpfs:
      - /var/lib/asterisk
      - /var/log/asterisk
      - /var/spool/asterisk
      - /var/log/asterisk/cdr-csv
    environment:
      - NTFY_URL
      - NC_URL
      - NC_USER
      - NC_APP_PASSWORD
      - TS_AUTHKEY
    networks:
      - swarm-macvlan
      - swarm-overlay
    volumes:
      - /mnt/gluster/asterisk/tailscale:/var/lib/tailscale
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
        window: 120s
    healthcheck:
      disable: true

  cups:
    image: ydkn/cups:latest
    networks:
      - swarm-overlay
    ports:
      - target: 631
        published: 631
        protocol: tcp
        mode: ingress
    environment:
      - ADMIN_PASSWORD=admin
    entrypoint: >
      /bin/bash -c "
      echo 'ServerAlias *' >> /etc/cups/cupsd.conf &&
      /usr/sbin/cupsd && 
      echo 'Waiting for CUPS to start...' &&
      while ! lpstat -r >/dev/null 2>&1; do sleep 2; done &&
      echo 'CUPS is ready! Configuring server...' &&
      cupsctl --remote-any --share-printers &&
      echo 'Registering printer...' &&
      lpadmin -p Canon_G3060 -E -v ipp://192.168.1.221/ipp/print -m everywhere -o printer-is-shared=true && 
      lpadmin -d Canon_G3060 &&
      echo 'Printer registered successfully!' &&
      tail -f /var/log/cups/error_log
      "
    deploy:
      mode: replicated
      replicas: 1

networks:
  swarm-macvlan:
    external: true
    name: swarm-macvlan
  swarm-overlay:
    external: true
    name: swarm-overlay
