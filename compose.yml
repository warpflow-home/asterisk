services:
  asterisk:
    image: ghcr.io/jarodbruce/asterisk-homelab:latest
    healthcheck:
      disable: true
    networks:
      - hostnet
    deploy:
      replicas: 1
      # placementは削除し、Swarmに配置を任せる

  cups:
    image: ydkn/cups:latest
    networks:
      - hostnet
    environment:
      - ADMIN_PASSWORD=admin
    entrypoint: /bin/bash -c "
      /usr/sbin/cupsd && 
      sleep 5 && 
      lpadmin -p Canon_G3060 -E -v ipp://192.168.1.221/ipp/print -m everywhere && 
      lpadmin -d Canon_G3060 &&
      tail -f /var/log/cups/error_log"
    deploy:
      # ここを global に変更（全ノードに1つずつ配置）
      mode: global

networks:
  hostnet:
    name: host
    external: true