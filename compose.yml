services:
  asterisk:
    image: ghcr.io/jarodbruce/asterisk-homelab:latest
    healthcheck:
      disable: true
    networks:
      macvlan_net:
        ipv4_address: 192.168.1.200
    deploy:
      replicas: 1

  cups:
    image: ydkn/cups:latest
    networks:
      - hostnet
    environment:
      - ADMIN_PASSWORD=admin
    entrypoint: /bin/bash -c "
      /usr/sbin/cupsd && 
      sleep 5 && 
      lpadmin -p Canon_G3060 -E -v ipp://192.168.1.221/ipp/print -m everywhere && 
      lpadmin -d Canon_G3060 &&
      tail -f /var/log/cups/error_log"
    deploy:
      replicas: 1

networks:
  macvlan_net:
    driver: macvlan
    driver_opts:
      parent: enp1s0
    ipam:
      config:
        - subnet: 192.168.1.0/24