version: '3.8'

services:
  asterisk:
    image: andrius/asterisk:latest
    healthcheck:
      disable: true
    networks:
      - hostnet
    deploy:
      replicas: 1
      placement:
        constraints: [node.hostname == node01]
    configs:
      - source: asterisk_pjsip
        target: /etc/asterisk/pjsip.conf
      - source: asterisk_extensions
        target: /etc/asterisk/extensions.conf
      - source: asterisk_rtp
        target: /etc/asterisk/rtp.conf
networks:
  hostnet:
    name: host
    external: true

configs:
  asterisk_pjsip:
    file: ./config/pjsip.conf
  asterisk_extensions:
    file: ./config/extensions.conf
  asterisk_rtp:
    file: ./config/rtp.conf