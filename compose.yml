services:
  asterisk:
    image: ghcr.io/jarodbruce/asterisk-homelab:latest
    healthcheck:
      disable: true
    networks:
      - hostnet
    deploy:
      replicas: 1

  # ===== 以下を追加 =====
  cups:
    image: ydkn/cups:latest
    networks:
      - hostnet
    environment:
      - ADMIN_PASSWORD=admin
    # コンテナ起動時にプリンタを自動登録するスクリプトを実行
    entrypoint: /bin/bash -c "
      /usr/sbin/cupsd && 
      sleep 5 && 
      lpadmin -p Canon_G3060 -E -v ipp://192.168.1.221/ipp/print -m everywhere && 
      lpadmin -d Canon_G3060 &&
      tail -f /var/log/cups/error_log"
    deploy:
      replicas: 1

networks:
  hostnet:
    name: host
    external: true