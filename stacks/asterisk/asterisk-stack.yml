version: "3.9"

services:
  asterisk:
    # 既存のカスタムビルドイメージを使用します
    image: ghcr.io/warpflow-home/asterisk:latest
    hostname: asterisk

    # Docker Swarmで必要になる権限
    cap_add:
      - NET_ADMIN
      - SYS_NICE

    # 永続化したい場合はGlusterFSのパスに書き換えるか、あるいはイメージに設定が含まれている場合はvolumesを減らします
    # ここではガイドに従いGlusterFSを利用する設定例をコメントで残しつつ、
    # 元々の設定（イメージに直接コピーしている）を尊重し、データの永続化のみ行います
    volumes:
      - asterisk_data:/var/lib/asterisk
      - asterisk_logs:/var/log/asterisk
      - asterisk_spool:/var/spool/asterisk
      - asterisk_cdr:/var/log/asterisk/cdr-csv

    networks:
      swarm-macvlan:
        ipv4_address: 192.168.1.200     # 固定IPをLANに直接割り当て

    deploy:
      mode: replicated
      replicas: 1                       # SIP/RTPのポート競合を避けるため1台のみ
      update_config:
        order: stop-first               # 再起動時のIP競合防止
      placement:
        constraints:
          - node.role == manager        # (必要に応じて設定)

networks:
  swarm-macvlan:
    external: true
    name: swarm-macvlan

volumes:
  asterisk_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gluster/asterisk/var/lib/asterisk
  asterisk_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gluster/asterisk/var/log/asterisk
  asterisk_spool:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gluster/asterisk/var/spool/asterisk
  asterisk_cdr:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/gluster/asterisk/var/log/asterisk/cdr-csv
