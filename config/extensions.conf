[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
PHONEALL=PJSIP/201&PJSIP/202

[internal]
; ===== 外線発信 (0または1から始まる番号はHT813へ送る) =====
exten => _[01].,1,NoOp(Call from ${CALLERID(all)} to ${EXTEN})
        same => n,Dial(PJSIP/${EXTEN}@ht813,,tT)
        same => n,Hangup()

; ===== 内線同士の通話 =====
exten => _2XX,1,NoOp(Internal Call from ${CALLERID(all)} to ${EXTEN})
        same => n,Dial(PJSIP/${EXTEN},,tT)
        same => n,Hangup()

exten => _6XXX,1,NoOp(Internal Call from ${CALLERID(all)} to ${EXTEN})
        same => n,Dial(PJSIP/${EXTEN},,tT)
        same => n,Hangup()

; ===== 外線からの着信 (200) =====
exten => 200,1,NoOp(Call from PSTN to 200)
        same => n,Dial(${PHONEALL},,tT)
        same => n,Hangup()

; ===== FAX用 =====
exten => fax,1,NoOp(Receiving Fax)
        same => n,Set(FILENAME=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)})-${UNIQUEID}
        same => n,ReceiveFax(/srv/FAX/FAXIN/${FILENAME}.tiff,d)
        same => n,NoOp(FaxStatus: ${FAXOPT(status)})
        same => n,NoOp(FaxError: ${FAXOPT(error)})
        same => n,NoOp(FaxPages: ${FAXOPT(pages)})
        same => n,Hangup()