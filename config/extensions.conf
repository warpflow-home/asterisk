[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
PHONEALL=PJSIP/6001&PJSIP/6002&PJSIP/6003

[internal]
; ===== 外線発信 (0または1から始まる番号はHT813へ送る) =====
exten => _[01].,1,NoOp(Call from ${CALLERID(all)} to ${EXTEN})
        same => n,Dial(PJSIP/${EXTEN}@ht813,60,tT)
        same => n,Hangup()

; ===== 市外局番(0294)省略時の発信設定
exten => _ZXXXXX,1,NoOp(Local call: adding area code 0294)
        same => n,Dial(PJSIP/0294${EXTEN}@ht813,60,trT)
        same => n,Hangup()

; ===== 内線同士の通話 =====
exten => _2XX,1,NoOp(Internal Call from ${CALLERID(all)} to ${EXTEN})
        same => n,Dial(PJSIP/${EXTEN},60,tT)
        same => n,Hangup()

exten => _6XXX,1,NoOp(Internal Call from ${CALLERID(all)} to ${EXTEN})
        same => n,Dial(PJSIP/${EXTEN},60,tT)
        same => n,Hangup()

; ===== 外線からの着信 (200) =====
exten => 200,1,NoOp(Call from PSTN to 200)
        same => n,TrySystem(/var/lib/asterisk/scripts/on_call.sh "${CALLERID(num)}" &)
        same => n,Dial(${PHONEALL},60,trT)
        same => n,Hangup()

; ===== FAX受信デモ用内線 (6000番にダイヤルしてFAX機から送信テスト) =====
exten => 6000,1,NoOp(FAX Demo: Waiting for FAX...)
        same => n,Answer()
        ; 受信開始を通知
        same => n,System(curl -H "Title: FAX受信開始" -d "デモ回線(6000)でFAXの受信を開始しました" https://ntfy.sh/KxgaRAdAYycAOnTS)
        ; ファイル名の生成 (現在日時-UNIQUEID)
        same => n,Set(FILENAME=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID})
        ; 保存先パスの設定 (コンテナ内の /tmp に保存)
        same => n,Set(FAXFILE=/tmp/${FILENAME}.tiff)
        ; FAXの受信 (dオプションでデバッグ有効化)
        same => n,ReceiveFax(${FAXFILE},d)
        ; スクリプトにファイルパスを渡して実行
        same => n,TrySystem(/var/lib/asterisk/scripts/printfax.sh ${FAXFILE})
        same => n,Hangup()


; ===== 元の FAX (共通処理) の修正版 =====
; ※ HT813などの外線着信時に fax_detect = yes によって自動分岐してきた場合の処理です
exten => fax,1,NoOp(FAX detected! Receiving FAX...)
        same => n,System(curl -H "Title: FAX着信" -d "FAX信号を検知しました" https://ntfy.sh/KxgaRAdAYycAOnTS)
        ; 以前の記述ではカッコの位置がおかしかったため修正しました
        same => n,Set(FILENAME=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID})
        ; 保存先をコンテナ内で確実に書き込み可能な場所に変更 (/tmp 等)
        same => n,Set(FAXFILE=/tmp/${FILENAME}.tiff)
        same => n,ReceiveFax(${FAXFILE},d)
        same => n,TrySystem(/var/lib/asterisk/scripts/printfax.sh ${FAXFILE})
        same => n,Hangup()