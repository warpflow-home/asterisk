[modules]
autoload=yes

; Disable modules that fail to load or are not needed
noload => format_ogg_vorbis.so
noload => cdr_pgsql.so
noload => cdr_sqlite3_custom.so
noload => cel_sqlite3_custom.so

; Disable deprecated modules
noload => res_adsi.so
noload => app_adsiprog.so
noload => app_getcpeid.so

; --- コンテナ環境で不要なオーディオモジュール ---
; Docker内にサウンドカードがないため、ALSA/OSS/JACKのエラーを抑制
noload => chan_alsa.so
noload => chan_oss.so
noload => chan_console.so

; --- HEP (Homer) モジュール ---
; Homer SIPキャプチャを使わないため無効化
noload => res_hep.so
noload => res_hep_rtcp.so
noload => res_hep_pjsip.so

; --- PostgreSQL CEL ---
; PostgreSQLを使っていないため無効化
noload => cel_pgsql.so

; --- AEL (Asterisk Extension Language) ---
; AELを使わないため、サンプルファイルの警告を抑制
noload => pbx_ael.so
noload => res_ael_share.so

; --- Disable unused database and realtime modules ---
noload => res_config_pgsql.so
noload => res_config_ldap.so
noload => res_config_sqlite3.so
noload => res_phoneprov.so
noload => res_pjsip_phoneprov_provider.so
noload => res_smdi.so
noload => chan_unistim.so
